<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>免费抽奖弹窗预览</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 28px;
      display: flex;
      justify-content: center;
      gap: 28px;
      background: #eef3f3;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #111827;
    }
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      overflow: hidden;
      background:
        radial-gradient(ellipse 260px 340px at 0% 0%, rgba(184, 236, 225, .58) 0, rgba(219, 246, 241, .26) 58%, rgba(255,255,255,0) 86%),
        linear-gradient(180deg, #f8fdfc 0%, #f7fbfa 48%, #fafafa 100%);
      box-shadow: 0 18px 60px rgba(9, 48, 55, .12);
    }
    .status {
      height: 54px;
      padding: 18px 35px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 17px;
      font-weight: 800;
      color: #000;
    }
    .sys { display: flex; align-items: center; gap: 8px; }
    .bars { display: flex; gap: 2px; align-items: flex-end; height: 14px; }
    .bars i { width: 3px; border-radius: 2px; background: #000; display: block; }
    .bars i:nth-child(1) { height: 6px; }
    .bars i:nth-child(2) { height: 9px; }
    .bars i:nth-child(3) { height: 12px; }
    .bars i:nth-child(4) { height: 14px; }
    .wifi {
      width: 18px; height: 13px;
      border: 4px solid #000;
      border-left-color: transparent;
      border-right-color: transparent;
      border-bottom: 0;
      border-radius: 18px 18px 0 0;
      transform: translateY(2px);
    }
    .battery {
      width: 25px; height: 12px;
      border: 2px solid #000;
      border-radius: 3px;
      position: relative;
    }
    .battery::before {
      content: "";
      position: absolute;
      inset: 2px;
      background: #000;
      border-radius: 1px;
    }
    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 3px;
      width: 2px;
      height: 6px;
      background: #000;
      border-radius: 0 2px 2px 0;
    }
    .nav {
      height: 74px;
      padding: 24px 20px 0;
      display: grid;
      grid-template-columns: 72px 1fr 88px;
      align-items: start;
    }
    .back {
      width: 22px;
      height: 22px;
      border-left: 4px solid #000;
      border-bottom: 4px solid #000;
      transform: rotate(45deg);
      margin-left: 3px;
      margin-top: 3px;
    }
    .nav-title {
      text-align: center;
      font-size: 23px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: .5px;
    }
    .capsule-space { width: 88px; height: 32px; }
    .lottery-card {
      margin: 20px 15px 0;
      height: 300px;
      padding: 25px 24px;
      border-radius: 14px;
      background: rgba(226, 245, 242, .78);
      text-align: center;
    }
    .lottery-card h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 900;
    }
    .lottery-card p {
      margin: 16px 0 0;
      font-size: 15px;
      color: #5b6470;
    }
    .digit-panel {
      margin: 38px 23px 0;
      padding: 24px 26px;
      height: 132px;
      border-radius: 14px;
      background: rgba(255,255,255,.74);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .digit {
      height: 86px;
      border-radius: 8px;
      background: #007568;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 42px;
      font-weight: 900;
    }
    .submit-shadow {
      position: absolute;
      left: 38px;
      right: 38px;
      top: 332px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(180deg, #ba650b, #a55300);
      opacity: .92;
    }
    .rules-card {
      margin: 16px 15px 0;
      padding: 28px 32px;
      height: 230px;
      border-radius: 14px;
      background: rgba(255,255,255,.78);
      color: #111827;
      font-size: 15px;
      line-height: 2.05;
    }
    .rules-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 900;
    }
    .history {
      position: absolute;
      right: 16px;
      bottom: 46px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,.85);
      display: grid;
      place-items: center;
      text-align: center;
      font-size: 14px;
      line-height: 1.15;
      box-shadow: 0 6px 24px rgba(0,0,0,.12);
    }
    .mask {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .48);
      z-index: 10;
    }
    .popup {
      position: absolute;
      left: 42px;
      top: 254px;
      width: 291px;
      min-height: 300px;
      z-index: 20;
      border-radius: 50px 50px 46px 46px;
      background:
        radial-gradient(circle at 84% 38%, rgba(255, 196, 222, .38) 0, transparent 25%),
        linear-gradient(180deg, #fff9dd 0 7%, #fff 25%, #fff 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      text-align: center;
      overflow: visible;
    }
    .popup::before,
    .popup::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 64px;
      height: 26px;
      pointer-events: none;
      border-bottom-left-radius: 48px;
      border-bottom-right-radius: 48px;
    }
    .popup::before {
      border-bottom: 10px solid rgba(255, 196, 171, .55);
      transform: skewY(7deg);
      bottom: 68px;
    }
    .popup::after {
      border-bottom: 8px solid rgba(249, 214, 129, .5);
      transform: skewY(-6deg);
      bottom: 60px;
    }
    .emoji {
      position: absolute;
      left: 50%;
      top: -42px;
      width: 112px;
      height: 112px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 28%, #fff47a, #ffc31a 62%, #ee8c16);
      box-shadow: 0 10px 25px rgba(225, 124, 15, .18);
    }
    .emoji::before,
    .emoji::after {
      content: "";
      position: absolute;
      top: 42px;
      width: 23px;
      height: 10px;
      border-radius: 12px;
      background: #6b210e;
    }
    .emoji::before { left: 24px; transform: rotate(18deg); }
    .emoji::after { right: 24px; transform: rotate(-18deg); }
    .mouth {
      position: absolute;
      left: 50%;
      top: 58px;
      width: 38px;
      height: 39px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle at 50% 70%, #ff523b 0 35%, #6d130f 36% 100%);
    }
    .tear {
      position: absolute;
      top: 70px;
      width: 26px;
      height: 58px;
      border-radius: 16px 16px 26px 26px;
      background: linear-gradient(180deg, #37a8ff, #54cfff);
    }
    .tear.left { left: 22px; transform: rotate(12deg); }
    .tear.right { right: 22px; transform: rotate(-12deg); }
    .win .emoji { top: -50px; }
    .win .emoji::before,
    .win .emoji::after {
      width: 25px;
      height: 9px;
      top: 45px;
    }
    .win .mouth {
      width: 46px;
      height: 34px;
      top: 60px;
      border-radius: 0 0 50px 50px;
      background: #7a1d10;
      overflow: hidden;
    }
    .win .mouth::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: -3px;
      height: 13px;
      border-radius: 50%;
      background: #ff6b4e;
    }
    .stick {
      position: absolute;
      top: 45px;
      width: 22px;
      height: 76px;
      border-radius: 12px;
    }
    .stick.left {
      left: -9px;
      background: linear-gradient(180deg, #ff9a12, #ff6217);
      transform: rotate(-12deg);
    }
    .stick.right {
      right: -9px;
      background: linear-gradient(180deg, #7ee4ff, #28a9ec);
      transform: rotate(12deg);
    }
    .confetti {
      position: absolute;
      width: 38px;
      height: 18px;
      border-radius: 0 0 24px 24px;
      border-bottom: 12px solid #ff8fa3;
      transform: rotate(38deg);
    }
    .confetti.c1 { left: 36px; top: 42px; }
    .confetti.c2 { right: 55px; top: 48px; border-color: #cb8cf0; transform: rotate(-30deg); }
    .confetti.c3 { left: 70px; top: 92px; width: 18px; border-color: #64d5d4; }
    .confetti.c4 { right: 42px; top: 92px; width: 22px; border-color: #efd070; transform: rotate(18deg); }
    .spark {
      position: absolute;
      width: 22px;
      height: 22px;
      background: #d88cff;
      clip-path: polygon(50% 0, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0 50%, 38% 38%);
    }
    .spark.s1 { left: 96px; top: -8px; }
    .spark.s2 { right: 96px; top: -4px; background: #f4819a; transform: scale(.7); }
    .popup-title {
      margin: 176px 0 0;
      color: #e60000;
      font-size: 26px;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: .5px;
    }
    .lose .popup-title { margin-top: 172px; }
    .coupon {
      width: 266px;
      height: 70px;
      margin: 22px auto 0;
      border-radius: 10px;
      background: linear-gradient(90deg, #fff5bd, #fff8dc);
      display: grid;
      grid-template-columns: 92px 1px 1fr;
      align-items: center;
      overflow: hidden;
      color: #61230f;
    }
    .coupon::before,
    .coupon::after {
      content: "";
      position: absolute;
      left: 140px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      transform: translateX(-50%);
    }
    .coupon::before { top: 234px; }
    .coupon::after { top: 294px; }
    .coupon-price {
      font-size: 26px;
      font-weight: 900;
    }
    .coupon-line {
      height: 52px;
      border-left: 1px dashed #e7c97d;
    }
    .coupon-info {
      text-align: left;
      padding-left: 20px;
    }
    .coupon-name {
      font-size: 17px;
      font-weight: 900;
    }
    .coupon-desc {
      margin-top: 4px;
      font-size: 14px;
      color: #9a6a4b;
    }
    .popup-btn {
      position: relative;
      z-index: 3;
      width: 190px;
      height: 50px;
      margin: 45px auto 0;
      border: 0;
      border-radius: 28px;
      background: linear-gradient(180deg, #ff1717, #ff6949);
      color: #fff;
      font-size: 21px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(255, 45, 25, .22);
    }
    .win .popup-btn { margin-top: 22px; }
    .popup-note {
      margin-top: 18px;
      color: #a66d58;
      font-size: 14px;
      font-weight: 500;
    }
    .close {
      position: absolute;
      left: 50%;
      bottom: -46px;
      width: 32px;
      height: 32px;
      transform: translateX(-50%);
      border: 2px solid #fff;
      border-radius: 50%;
    }
    .close::before,
    .close::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 14px;
      width: 13px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
    }
    .close::before { transform: rotate(45deg); }
    .close::after { transform: rotate(-45deg); }
  </style>
</head>
<body>
  <main class="phone">
    <div class="status"><span>9:41</span><div class="sys"><div class="bars"><i></i><i></i><i></i><i></i></div><div class="wifi"></div><div class="battery"></div></div></div>
    <div class="nav"><div class="back"></div><div class="nav-title">免费抽奖</div><div class="capsule-space"></div></div>
    <section class="lottery-card">
      <h2>输入4位数字，猜对即可获奖</h2>
      <p>开奖时间为每晚21:38分</p>
      <div class="digit-panel"><div class="digit">5</div><div class="digit">4</div><div class="digit">2</div><div class="digit">6</div></div>
    </section>
    <div class="submit-shadow"></div>
    <section class="rules-card">
      <h3>抽奖规则</h3>
      <div>• 每人每天可免费参与1次</div>
      <div>• 每晚21:38分开奖</div>
      <div>• 猜中四位数字即可获得优惠券</div>
      <div>• 中奖券可到指定商家使用</div>
    </section>
    <div class="history">历史<br>抽奖</div>
    <div class="mask"></div>
    <section class="popup lose">
      <div class="emoji"><div class="mouth"></div><div class="tear left"></div><div class="tear right"></div></div>
      <i class="confetti c1"></i><i class="confetti c2"></i><i class="confetti c3"></i><i class="confetti c4"></i>
      <div class="popup-title">很遗憾<br>您没有中奖</div>
      <button class="popup-btn">知道了</button>
      <div class="close"></div>
    </section>
  </main>

  <main class="phone">
    <div class="status"><span>9:41</span><div class="sys"><div class="bars"><i></i><i></i><i></i><i></i></div><div class="wifi"></div><div class="battery"></div></div></div>
    <div class="nav"><div class="back"></div><div class="nav-title">免费抽奖</div><div class="capsule-space"></div></div>
    <section class="lottery-card">
      <h2>输入4位数字，猜对即可获奖</h2>
      <p>开奖时间为每晚21:38分</p>
      <div class="digit-panel"><div class="digit">5</div><div class="digit">4</div><div class="digit">2</div><div class="digit">6</div></div>
    </section>
    <div class="submit-shadow"></div>
    <section class="rules-card">
      <h3>抽奖规则</h3>
      <div>• 每人每天可免费参与1次</div>
      <div>• 每晚21:38分开奖</div>
      <div>• 猜中四位数字即可获得优惠券</div>
      <div>• 中奖券可到指定商家使用</div>
    </section>
    <div class="history">历史<br>抽奖</div>
    <div class="mask"></div>
    <section class="popup win">
      <div class="emoji"><div class="stick left"></div><div class="stick right"></div><div class="mouth"></div></div>
      <i class="confetti c1"></i><i class="confetti c2"></i><i class="confetti c3"></i><i class="confetti c4"></i><i class="spark s1"></i><i class="spark s2"></i>
      <div class="popup-title">恭喜中奖</div>
      <div class="coupon">
        <div class="coupon-price">¥100</div>
        <div class="coupon-line"></div>
        <div class="coupon-info"><div class="coupon-name">通用代金券</div><div class="coupon-desc">满200元可用</div></div>
      </div>
      <button class="popup-btn">去使用</button>
      <div class="popup-note">可在【我的-优惠券包】查看</div>
      <div class="close"></div>
    </section>
  </main>
</body>
</html>
