<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>同城生活首页</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ececec;
      display: flex;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #20242a;
    }

    .phone {
      position: relative;
      width: 375px;
      min-height: 812px;
      background: #f7f7f7;
      overflow: hidden;
    }

    .page {
      min-height: 812px;
      padding: 0 16px 86px;
      background: #f7f7f7;
    }

    .status-bar {
      height: 44px;
      padding: 14px 20px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 800;
      color: #0c131a;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .signal {
      width: 18px;
      height: 12px;
      display: grid;
      grid-template-columns: repeat(4, 3px);
      align-items: end;
      gap: 2px;
    }

    .signal i {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: #05070a;
    }

    .signal i:nth-child(1) { height: 4px; }
    .signal i:nth-child(2) { height: 6px; }
    .signal i:nth-child(3) { height: 9px; }
    .signal i:nth-child(4) { height: 12px; }

    .wifi {
      width: 17px;
      height: 12px;
      position: relative;
    }

    .wifi::before,
    .wifi::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border: 2px solid #05070a;
      border-bottom: 0;
      border-radius: 16px 16px 0 0;
    }

    .wifi::before {
      top: 0;
      width: 17px;
      height: 9px;
    }

    .wifi::after {
      top: 5px;
      width: 9px;
      height: 5px;
    }

    .battery {
      position: relative;
      width: 23px;
      height: 12px;
      border: 2px solid #05070a;
      border-radius: 3px;
    }

    .battery::before {
      content: "";
      position: absolute;
      right: -4px;
      top: 3px;
      width: 2px;
      height: 4px;
      background: #05070a;
      border-radius: 0 2px 2px 0;
    }

    .battery::after {
      content: "";
      position: absolute;
      inset: 2px;
      background: #05070a;
      border-radius: 1px;
    }

    .nav {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 20px;
      font-weight: 700;
    }

    .pin {
      width: 20px;
      height: 20px;
      color: #20262d;
    }

    .capsule {
      width: 86px;
      height: 38px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .dots {
      display: flex;
      gap: 4px;
    }

    .dots i {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #020509;
    }

    .capsule-line {
      width: 1px;
      height: 18px;
      background: rgba(0, 0, 0, 0.12);
    }

    .mini-circle {
      width: 19px;
      height: 19px;
      border: 3px solid #05070a;
      border-radius: 50%;
      position: relative;
    }

    .mini-circle::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #05070a;
    }

    .banner {
      position: relative;
      height: 177px;
      margin-top: 8px;
      border-radius: 11px;
      overflow: hidden;
      color: #fff;
      background:
        linear-gradient(90deg, rgba(3, 112, 108, 0.96) 0%, rgba(6, 125, 122, 0.86) 42%, rgba(22, 74, 67, 0.2) 100%),
        url("assets/merchant-restaurant.png") center right / cover no-repeat;
    }

    .banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 75% 22%, rgba(255, 213, 153, 0.32), transparent 24%),
        linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.22) 100%);
    }

    .banner-art {
      position: absolute;
      right: 0;
      top: 0;
      width: 180px;
      height: 177px;
      background:
        radial-gradient(circle at 70% 44%, rgba(255, 233, 195, 0.42) 0 16px, transparent 17px),
        radial-gradient(circle at 58% 50%, rgba(255, 214, 158, 0.32) 0 9px, transparent 10px),
        linear-gradient(140deg, transparent 0 38%, rgba(139, 81, 35, 0.72) 39% 58%, transparent 59%),
        radial-gradient(ellipse at 65% 70%, rgba(109, 55, 21, 0.92) 0 38px, transparent 39px),
        radial-gradient(ellipse at 74% 72%, rgba(239, 162, 76, 0.86) 0 56px, transparent 57px);
      opacity: 0.96;
      z-index: 1;
    }

    .banner-copy {
      position: relative;
      z-index: 2;
      padding: 30px 0 0 28px;
    }

    .banner-title {
      display: block;
      font-family: "STKaiti", "KaiTi", serif;
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 2px 2px rgba(0, 0, 0, 0.12);
    }

    .banner-sub {
      display: block;
      margin-top: 13px;
      font-size: 21px;
      line-height: 1.24;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .banner-pill {
      display: inline-flex;
      margin-top: 18px;
      padding: 4px 14px;
      border: 1px solid rgba(244, 204, 119, 0.74);
      border-radius: 15px;
      background: rgba(32, 101, 94, 0.72);
      color: #f9dd95;
      font-size: 12px;
      font-weight: 700;
    }

    .banner-small {
      display: block;
      margin-top: 6px;
      color: rgba(255, 245, 219, 0.92);
      font-size: 11px;
    }

    .banner-dots {
      position: absolute;
      left: 164px;
      bottom: 14px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .banner-dots i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.56);
    }

    .banner-dots i:first-child {
      width: 24px;
      border-radius: 8px;
      background: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      row-gap: 27px;
      margin: 26px 0 32px;
    }

    .grid-item {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      color: #2c3036;
    }

    .kg-icon {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .kg-icon svg {
      width: 52px;
      height: 52px;
      display: block;
    }

    h2 {
      margin: 0 0 15px 4px;
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
      color: #22262d;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px 14px;
      padding-bottom: 20px;
    }

    .card {
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
    }

    .food-image {
      height: 118px;
      background-position: center;
      background-size: cover;
    }

    .food-a {
      background-image:
        linear-gradient(135deg, rgba(255, 171, 61, 0.08), rgba(0, 0, 0, 0.08)),
        url("assets/deal-seafood.png");
    }

    .food-b {
      background-image:
        radial-gradient(circle at 74% 42%, rgba(255, 219, 118, 0.4), transparent 22%),
        url("assets/merchant-restaurant.png");
    }

    .food-c {
      background-image:
        linear-gradient(135deg, rgba(255, 129, 39, 0.18), rgba(117, 26, 10, 0.08)),
        url("assets/merchant-dessert.png");
    }

    .food-d {
      background-image:
        linear-gradient(135deg, rgba(255, 70, 50, 0.18), rgba(255, 189, 77, 0.08)),
        url("assets/merchant-playground.png");
    }

    .card-body {
      padding: 12px 12px 14px;
    }

    .card-title {
      display: block;
      margin-bottom: 14px;
      color: #242830;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      white-space: nowrap;
    }

    .price {
      color: #13b8d1;
      font-size: 18px;
      font-weight: 900;
    }

    .old-price {
      color: #b8bec7;
      font-size: 12px;
      text-decoration: line-through;
    }

    .discount {
      padding: 3px 5px;
      border-radius: 5px;
      background: #fff2e8;
      color: #ff7a24;
      font-size: 12px;
      line-height: 1;
    }

    .tabbar {
      position: fixed;
      left: 50%;
      bottom: 0;
      width: 375px;
      height: 78px;
      transform: translateX(-50%);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      background: rgba(255, 255, 255, 0.96);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding-top: 9px;
      z-index: 10;
    }

    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #6c7179;
      font-size: 12px;
      line-height: 1;
    }

    .tab img {
      width: 25px;
      height: 25px;
      object-fit: contain;
    }

    .tab.active {
      color: #006b68;
      font-weight: 800;
    }
  </style>
</head>
