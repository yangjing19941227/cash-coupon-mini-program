<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的订单状态列表</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      background: #e9eeee;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #071426;
    }
    .phone {
      width: 375px;
      min-height: 812px;
      padding: 0 15px 28px;
      background:
        radial-gradient(ellipse 260px 340px at 0% 0%, rgba(184, 236, 225, 0.58) 0, rgba(219, 246, 241, 0.26) 64%, rgba(255, 255, 255, 0) 86%),
        linear-gradient(180deg, #f8fdfc 10%, #f7fbfa 50%, #fafafa 100%);
    }
    .top {
      height: 74px;
      padding-top: 44px;
      display: grid;
      grid-template-columns: 60px 1fr 77px;
      align-items: center;
      margin: 0 -15px 14px;
      padding-left: 16px;
      padding-right: 16px;
    }
    .back {
      font-size: 34px;
      line-height: 1;
    }
    .title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
    }
    .capsule-space {
      width: 77px;
      height: 32px;
    }
    .tabs {
      height: 38px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      margin-bottom: 12px;
      border-radius: 19px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.64);
    }
    .tab {
      position: relative;
      height: 38px;
      border: 0;
      background: transparent;
      color: #4f5d6d;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
    }
    .tab.active {
      color: #006b68;
      font-weight: 900;
    }
    .tab.active::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 27px;
      height: 3px;
      border-radius: 3px;
      background: #006b68;
      transform: translateX(-50%);
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }
    .card {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
    }
    .title-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .coupon-title {
      min-width: 0;
      flex: 1;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 900;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .status {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1;
      font-weight: 800;
    }
    .pending { color: #c77900; background: rgba(255, 241, 217, 0.92); }
    .verify { color: #006b68; background: rgba(224, 242, 240, 0.92); }
    .completed { color: #12805c; background: rgba(222, 245, 235, 0.92); }
    .refund { color: #df4b2f; background: rgba(255, 240, 235, 0.92); }
    .content-row {
      margin-top: 11px;
      display: grid;
      grid-template-columns: 78pt minmax(0, 1fr);
      gap: 11px;
      align-items: start;
    }
    .thumb {
      width: 78pt;
      height: 78pt;
      border-radius: 8px;
      object-fit: cover;
      background: #e8f4f3;
    }
    .info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tag {
      padding: 3px 6px;
      border-radius: 4px;
      background: #f0f2f3;
      color: #667185;
      font-size: 10px;
      line-height: 1;
    }
    .meta, .sub-meta {
      color: #667185;
      font-size: 12px;
      line-height: 1.35;
    }
    .sub-meta { color: #8792a0; }
    .bottom-row {
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .price {
      color: #ef4b2e;
      font-size: 17px;
      line-height: 1;
      font-weight: 900;
    }
    .action {
      min-width: 52px;
      height: 26px;
      padding: 0 9px;
      border-radius: 14px;
      border: 0;
      background: linear-gradient(135deg, #007a75, #005f5d);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <main class="phone">
    <header class="top">
      <div class="back">‹</div>
      <div class="title">我的订单</div>
      <div class="capsule-space" aria-hidden="true"></div>
    </header>

    <nav class="tabs" aria-label="订单状态">
      <button class="tab active" data-status="pending">待付款</button>
      <button class="tab" data-status="verify">待核销</button>
      <button class="tab" data-status="completed">已完成</button>
      <button class="tab" data-status="refund">退款中</button>
    </nav>

    <section class="list" id="orderList"></section>
  </main>

  <script>
    const orders = [
      ['pending', '待付款', 'pending', '海岛小院·双人海鲜套餐券超值到店可用', '../assets/images/deal-seafood.png', ['餐饮美食', '龙华区'], '请在 14:20 前完成支付', '订单号 202606250941', '￥128', '去付款'],
      ['pending', '待付款', 'pending', '椰子鸡火锅套餐券', '../assets/images/coupon-deal-meal-clean.png', ['火锅套餐', '美兰区'], '库存已锁定 15 分钟', '订单号 202606251006', '￥158', '去付款'],
      ['verify', '待核销', 'verify', '西湖悦享KTV·双人欢唱套餐', '../assets/images/coupon-deal-fish-clean.png', ['娱乐休闲', '预约套餐'], '预约时间 今天 19:30', '到店出示券码核销', '￥108', '出示券码'],
      ['verify', '待核销', 'verify', '海口湾下午茶双人券', '../assets/images/merchant-dessert.png', ['甜品饮品', '秀英区'], '有效期至 2026-06-30 23:59', '门店通用，扫码核销', '￥68', '出示券码'],
      ['completed', '已完成', 'completed', '海口湾下午茶券', '../assets/images/coupon-deal-tea-clean.png', ['甜品饮品', '已到店核销'], '完成时间 昨天 18:42', '积分 +68 已到账', '￥68', '查看详情'],
      ['completed', '已完成', 'completed', '骑楼老街美食券', '../assets/images/deal-qilou-food.png', ['餐饮美食', '已完成'], '完成时间 06-24 12:18', '优惠券抵扣已计入资产流水', '￥30', '查看详情'],
      ['refund', '退款中', 'refund', '亲子乐园通用票', '../assets/images/merchant-playground.png', ['亲子娱乐', '售后处理中'], '商家确认中', '预计 1-3 天原路退回', '￥60', '售后进度'],
      ['refund', '退款中', 'refund', '米可造型洗剪吹体验券', '../assets/images/coupon-deal-hair-clean.png', ['丽人美发', '退款处理中'], '客服审核中', '售后单 202606250018', '￥18.51', '售后进度'],
    ];

    const list = document.querySelector('#orderList');
    const tabs = Array.from(document.querySelectorAll('.tab'));

    function render(status) {
      list.innerHTML = orders
        .filter((item) => item[0] === status)
        .map((item) => `
          <article class="card">
            <div class="title-row">
              <div class="coupon-title">${item[3]}</div>
              <div class="status ${item[2]}">${item[1]}</div>
            </div>
            <div class="content-row">
              <img class="thumb" src="${item[4]}" alt="">
              <div class="info">
                <div class="tags">${item[5].map((tag) => `<span class="tag">${tag}</span>`).join('')}</div>
                <div class="meta">${item[6]}</div>
                <div class="sub-meta">${item[7]}</div>
                <div class="bottom-row"><div class="price">${item[8]}</div><button class="action">${item[9]}</button></div>
              </div>
            </div>
          </article>
        `)
        .join('');
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach((item) => item.classList.remove('active'));
        tab.classList.add('active');
        render(tab.dataset.status);
      });
    });

    render('pending');
  </script>
</body>
</html>
