<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>抽奖交互预览</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      background: #eef4f4;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #071426;
    }
    .phone {
      position: relative;
      width: 375px;
      min-height: 812px;
      overflow: hidden;
      background:
        radial-gradient(180px 150px at 9% 0%, rgba(171, 231, 219, .52), transparent 68%),
        linear-gradient(180deg, #f8ffff 0%, #f9fbfb 42%, #fff 100%);
    }
    .status { height: 44px; padding: 17px 31px 0; display:flex; justify-content:space-between; font-size:17px; font-weight:700; }
    .top { height: 54px; padding: 12px 18px 0; display:grid; grid-template-columns: 88px 1fr 88px; align-items:start; }
    .capsule-space { height:32px; }
    .head { margin-top: 18px; text-align:center; display:flex; flex-direction:column; align-items:center; }
    .title { color:#071426; font-size:32px; line-height:1.18; font-weight:900; }
    .sub { margin-top:8px; color:#4e5d70; font-size:14px; }
    .card {
      margin: 24px 18px 0;
      padding: 24px;
      border: 1px solid #c3dce0;
      border-radius: 18px;
      background: rgba(255,255,255,.72);
      text-align:center;
    }
    .tip { color:#006b68; font-size:20px; font-weight:900; }
    .muted { margin-top:8px; color:#526173; font-size:13px; }
    .digits { margin:24px 0 14px; display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .digit {
      width:100%;
      height:82px;
      border:1px solid #b7d4d7;
      border-radius:8px;
      background:rgba(255,255,255,.78);
      color:#006b68;
      text-align:center;
      font-size:48px;
      font-weight:900;
      outline:none;
    }
    .digit:disabled { background:#eef4f4; color:#768391; border-color:#cfd8dc; opacity:1; }
    .random { color:#006b68; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
    .random-icon { font-size:17px; font-weight:800; line-height:1; }
    .random.disabled { color:#9aa6b2; cursor:default; }
    .wait { display:none; margin-top:8px; color:#667185; font-size:13px; }
    .wait strong { color:#e84d33; font-weight:900; }
    .btn {
      width:100%;
      height:48px;
      margin-top:20px;
      border:0;
      border-radius:10px;
      background:#00756f;
      color:#fff;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
    }
    .btn:disabled { background:#ececec; color:#667185; cursor:default; opacity:1; }
    .rule { margin-top:18px; color:#667185; font-size:13px; }
    .note {
      margin: 24px 18px 0;
      padding: 18px;
      border: 1px solid #d7e7e8;
      border-radius: 16px;
      background: rgba(255,255,255,.7);
      display:grid;
      grid-template-columns:42px 1fr 98px;
      gap:12px;
      align-items:center;
    }
    .round { width:36px; height:36px; border-radius:50%; background:#e8f4f2; color:#006b68; display:grid; place-items:center; }
    .note-title { font-size:16px; font-weight:800; }
    .note-sub { margin-top:4px; color:#667185; font-size:12px; }
    .outline {
      justify-self:end;
      min-width:86px;
      height:26px;
      padding:0 5px;
      border:1px solid #00756f;
      border-radius:14px;
      color:#006b68;
      font-size:11px;
      display:grid;
      place-items:center;
      white-space:nowrap;
    }
    .tab { position:absolute; left:0; right:0; bottom:0; height:78px; border-top:1px solid #e5ecef; background:#fff; display:grid; grid-template-columns:repeat(5,1fr); padding-top:10px; }
    .tab-item { text-align:center; color:#7b8794; font-size:12px; }
    .tab-icon { display:block; margin-bottom:4px; font-size:24px; color:inherit; }
    .active { color:#006b68; font-weight:700; }
    .home-indicator { position:absolute; left:126px; bottom:8px; width:123px; height:5px; border-radius:5px; background:#000; }
    .mask { position:absolute; inset:0; display:none; align-items:center; justify-content:center; padding:24px; background:rgba(7,20,38,.42); z-index:5; }
    .dialog { width:100%; padding:24px 20px 18px; border-radius:18px; border:1px solid #c3dce0; background:rgba(255,255,255,.97); }
    .dialog-title { text-align:center; font-size:20px; font-weight:900; }
    .row { margin-top:14px; height:36px; padding:0 12px; border-radius:8px; background:#eff8f8; display:flex; align-items:center; justify-content:space-between; color:#4b5b6b; font-size:13px; }
    .num { color:#006b68; font-size:17px; font-weight:900; }
    .reward { margin-top:14px; padding:12px; border-radius:9px; background:#fff5ef; display:none; justify-content:space-between; color:#667185; font-size:13px; }
    .reward strong { color:#e84d33; }
    .result-muted { margin-top:14px; color:#667185; text-align:center; font-size:13px; display:none; }
  </style>
</head>
<body>
  <main class="phone">
    <div class="status"><span>9:41</span><span>▮▮▮⌁▱</span></div>
    <div class="top"><div></div><div></div><div class="capsule-space"></div></div>
    <section class="head">
      <div class="title">输入四位数参与</div>
      <div class="sub">中奖奖励自动发放优惠券</div>
    </section>
    <section class="card">
      <div class="tip">输入4位数字，猜对即可获奖</div>
      <div class="muted">开奖时间为每晚21:38分</div>
      <div class="digits">
        <input class="digit" maxlength="1" inputmode="numeric" value="3">
        <input class="digit" maxlength="1" inputmode="numeric" value="8">
        <input class="digit" maxlength="1" inputmode="numeric" value="0">
        <input class="digit" maxlength="1" inputmode="numeric" value="6">
      </div>
      <div id="random" class="random"><span class="random-icon">↻</span><span>随机生成一组数字</span></div>
      <div id="wait" class="wait">距离开奖还有 <strong>0</strong> 小时 <strong>00</strong> 分钟</div>
      <button id="submit" class="btn">提交号码</button>
      <div class="rule">ⓘ 开奖规则</div>
    </section>
    <section class="note">
      <div class="round">▣</div>
      <div><div class="note-title">我的抽奖</div><div class="note-sub">所有记录均可在个人中心查看</div></div>
      <div class="outline">查看抽奖记录</div>
    </section>
    <nav class="tab">
      <div class="tab-item"><span class="tab-icon">⌂</span>首页</div>
      <div class="tab-item"><span class="tab-icon">▱</span>优惠券</div>
      <div class="tab-item"><span class="tab-icon">↔</span>置换</div>
      <div class="tab-item active"><span class="tab-icon">▣</span>抽奖</div>
      <div class="tab-item"><span class="tab-icon">♙</span>我的</div>
    </nav>
    <div class="home-indicator"></div>
    <div id="mask" class="mask">
      <div class="dialog">
        <div id="resultTitle" class="dialog-title"></div>
        <div class="row"><span>开奖号码</span><span id="winning" class="num"></span></div>
        <div class="row"><span>参与号码</span><span id="userNumber" class="num"></span></div>
        <div id="reward" class="reward"><span>奖励内容</span><strong>海岛小院优惠券 ¥30</strong></div>
        <div id="loseText" class="result-muted">本期未命中，明天21:38可继续参与</div>
        <button id="resultBtn" class="btn"></button>
      </div>
    </div>
  </main>
  <script>
    const inputs = [...document.querySelectorAll('.digit')];
    const random = document.querySelector('#random');
    const submit = document.querySelector('#submit');
    const wait = document.querySelector('#wait');
    const mask = document.querySelector('#mask');
    let userNumber = '';
    let timer = null;
    let remain = 10;

    function number() {
      return Array.from({ length: 4 }, () => Math.floor(Math.random() * 10)).join('');
    }

    function renderWait() {
      const minutes = String(Math.ceil(remain / 60)).padStart(2, '0');
      wait.innerHTML = `距离开奖还有 <strong>0</strong> 小时 <strong>${minutes}</strong> 分钟`;
    }

    inputs.forEach((input, index) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '').slice(-1);
        if (input.value && inputs[index + 1]) inputs[index + 1].focus();
      });
    });

    random.addEventListener('click', () => {
      if (submit.disabled) return;
      number().split('').forEach((n, i) => inputs[i].value = n);
    });

    submit.addEventListener('click', () => {
      userNumber = inputs.map(i => i.value).join('');
      if (userNumber.length !== 4) return;
      inputs.forEach(i => i.disabled = true);
      random.classList.add('disabled');
      random.style.display = 'none';
      submit.textContent = '已提交，等待开奖';
      submit.disabled = true;
      wait.style.display = 'block';
      renderWait();
      timer = setInterval(() => {
        remain -= 1;
        renderWait();
        if (remain <= 0) {
          clearInterval(timer);
          showResult();
        }
      }, 1000);
    });

    function showResult() {
      const winning = number();
      const isWinner = winning === userNumber;
      document.querySelector('#resultTitle').textContent = isWinner ? '🎉 恭喜中奖' : '很遗憾，未中奖';
      document.querySelector('#winning').textContent = winning;
      document.querySelector('#userNumber').textContent = userNumber;
      document.querySelector('#reward').style.display = isWinner ? 'flex' : 'none';
      document.querySelector('#loseText').style.display = isWinner ? 'none' : 'block';
      document.querySelector('#resultBtn').textContent = isWinner ? '查看我的奖励' : '继续参与';
      mask.style.display = 'flex';
    }

    document.querySelector('#resultBtn').addEventListener('click', () => {
      mask.style.display = 'none';
      inputs.forEach(i => { i.disabled = false; i.value = ''; });
      random.classList.remove('disabled');
      submit.textContent = '提交号码';
      submit.disabled = false;
      wait.style.display = 'none';
      remain = 10;
    });
  </script>
</body>
</html>
