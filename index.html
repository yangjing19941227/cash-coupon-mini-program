<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>同城名惠小程序 UI</title>
  <meta http-equiv="refresh" content="0; url=html-preview/index.html">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(420px 280px at 16% 0%, rgba(190, 239, 229, .72), transparent 72%),
        linear-gradient(180deg, #f7fcfb 0%, #eff5f5 100%);
      color: #071426;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      width: min(520px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid rgba(7, 20, 38, .08);
      border-radius: 18px;
      background: rgba(255, 255, 255, .78);
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 12px 0 22px;
      color: #667185;
      font-size: 15px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #007a75, #005f5d);
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>同城名惠小程序 UI</h1>
    <p>正在打开 UI 总览与上下游页面预览。</p>
    <a href="html-preview/index.html">进入 UI 总览</a>
  </main>
</body>
</html>
